<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>User Management - PostgreSQL API</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      body {
        background-color: #f8f9fa;
        padding-top: 50px;
      }
      .card {
        border: none;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-md-8">
          <h2 class="text-center mb-4">🚀 Users Control Panel</h2>

          <div class="card mb-4">
            <div class="card-body">
              <h5 class="card-title">New User</h5>
              <form id="userForm" class="row g-3">
                <div class="col-md-5">
                  <input
                    type="text"
                    id="nombre"
                    class="form-control"
                    placeholder="Name"
                    required
                  />
                </div>
                <div class="col-md-5">
                  <input
                    type="text"
                    id="rol"
                    class="form-control"
                    placeholder="Role (e.g: Admin)"
                    required
                  />
                </div>
                <div class="col-md-2">
                  <button type="submit" class="btn btn-primary w-100">
                    Add
                  </button>
                </div>
              </form>
            </div>
          </div>

          <div class="card">
            <div class="card-body p-0">
              <table class="table table-hover mb-0">
                <thead class="table-dark">
                  <tr>
                    <th class="ps-3">ID</th>
                    <th>Name</th>
                    <th>Role</th>
                    <th class="text-center">Action</th>
                  </tr>
                </thead>
                <tbody id="userTableBody"></tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Modal for Edit User -->
    <div class="modal fade" id="editModal" tabindex="-1">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">Edit User</h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
            ></button>
          </div>
          <div class="modal-body">
            <div class="mb-3">
              <label class="form-label">Name</label>
              <input
                type="text"
                id="editNombre"
                class="form-control"
                placeholder="E.g: John"
              />
            </div>
            <div class="mb-3">
              <label class="form-label">New Role</label>
              <input
                type="text"
                id="editRol"
                class="form-control"
                placeholder="E.g: Admin"
              />
            </div>
          </div>
          <div class="modal-footer">
            <button
              type="button"
              class="btn btn-secondary"
              data-bs-dismiss="modal"
            >
              Cancel
            </button>
            <button
              type="button"
              class="btn btn-primary"
              onclick="guardarCambios()"
            >
              Save Changes
            </button>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      const API_URL = "http://localhost:3000/api/usuarios";
      let usuarioEditandoId = null;

      // 1. Load users when page opens
      async function cargarUsuarios() {
        const res = await fetch(API_URL);
        const usuarios = await res.json();
        const tabla = document.getElementById("userTableBody");
        tabla.innerHTML = ""; // Clear table

        usuarios.forEach((user) => {
          tabla.innerHTML += `
                <tr>
                    <td class="ps-3">${user.id}</td>
                    <td>${user.nombre}</td>
                    <td><span class="badge bg-info text-dark">${user.rol}</span></td>
                    <td class="text-center">
                        <button class="btn btn-sm btn-warning me-2" onclick="abrirEditarModal(${user.id}, '${user.nombre}', '${user.rol}')">Edit</button>
                        <button class="btn btn-sm btn-danger" onclick="eliminarUsuario(${user.id})">Delete</button>
                    </td>
                </tr>
            `;
        });
      }

      // 2. Create a new user (POST)
      document
        .getElementById("userForm")
        .addEventListener("submit", async (e) => {
          e.preventDefault();
          const nombre = document.getElementById("nombre").value;
          const rol = document.getElementById("rol").value;

          await fetch(API_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ nombre, rol }),
          });

          document.getElementById("userForm").reset();
          cargarUsuarios();
        });

      // 3. Delete a user (DELETE)
      async function eliminarUsuario(id) {
        if (confirm("Are you sure you want to delete this user?")) {
          await fetch(`${API_URL}/${id}`, { method: "DELETE" });
          cargarUsuarios();
        }
      }

      // 4. Open modal to edit user
      function abrirEditarModal(id, nombre, rol) {
        usuarioEditandoId = id;
        document.getElementById("editNombre").value = nombre;
        document.getElementById("editRol").value = rol;
        const modal = new bootstrap.Modal(document.getElementById("editModal"));
        modal.show();
      }

      // 5. Save changes (PUT)
      async function guardarCambios() {
        const nuevoNombre = document.getElementById("editNombre").value;
        const nuevoRol = document.getElementById("editRol").value;

        if (!nuevoNombre.trim()) {
          alert("Name cannot be empty");
          return;
        }
        if (!nuevoRol.trim()) {
          alert("Role cannot be empty");
          return;
        }

        await fetch(`${API_URL}/${usuarioEditandoId}`, {
          method: "PUT",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ nombre: nuevoNombre, rol: nuevoRol }),
        });

        // Close modal and reload
        bootstrap.Modal.getInstance(
          document.getElementById("editModal"),
        ).hide();
        cargarUsuarios();
      }

      // Initialize
      cargarUsuarios();
    </script>
  </body>
</html>
